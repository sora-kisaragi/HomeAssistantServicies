services:
  discovery-api:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: discovery-api
    restart: unless-stopped
    ports:
      - "8765:8765"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    volumes:
      # Docker socket — rw required for on-demand start/stop control
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount project root so all manifest.json files are discoverable
      - ..:/manifests:ro
    env_file:
      - path: ../.env
        required: false
      - path: .env
        required: false
    environment:
      - MANIFESTS_DIR=/manifests
    labels:
      homeassistant.service: "true"
      homeassistant.name: "discovery-api"
      homeassistant.display_name: "Service Discovery API"
      homeassistant.description: "稼働中のサービス一覧・ポート・ヘルス状態を返す API"
      homeassistant.category: "infrastructure"
      homeassistant.port: "8765"
      homeassistant.icon: "api"
      homeassistant.docs_url: "http://localhost:8765/docs"
    networks:
      - homeassistant

networks:
  homeassistant:
    external: true
    name: homeassistant
