# SearXNG settings
# See: https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

general:
  debug: false
  instance_name: "SearXNG"
  privacypolicy_url: false
  donation_url: false
  contact_url: false
  enable_metrics: false

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ja"
  languages:
    - "ja"
    - "en"
  ban_time_on_fail: 5
  max_ban_time_on_fail: 120

server:
  # Secret key is loaded from SEARXNG_SECRET_KEY env var
  secret_key: "${SEARXNG_SECRET_KEY}"
  limiter: true
  image_proxy: true
  method: "GET"

ui:
  static_use_hash: true
  default_locale: "ja"
  query_in_title: false
  infinite_scroll: false
  center_alignment: false
  default_theme: simple
  theme_args:
    simple_style: auto

# Enabled search engines
engines:
  - name: google
    engine: google
    shortcut: g
  - name: bing
    engine: bing
    shortcut: b
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    base_url: "https://ja.wikipedia.org/"
    number_of_results: 5
